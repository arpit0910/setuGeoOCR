version: '3.8'

services:
  ocr-service:
    build: .
    container_name: setu-geo-ocr
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
